name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.SECRET_TOKEN }}

    - name: Build mock-server
      run: |
        docker build -t 7838nisha/flask-fast-api:mock ./mock-server

    - name: Push mock-server
      run: |
        docker push 7838nisha/flask-fast-api:mock

    - name: Build pipeline-service
      run: |
        docker build -t 7838nisha/flask-fast-api:pipeline ./pipeline-service

    - name: Push pipeline-service
      run: |
        docker push 7838nisha/flask-fast-api:pipeline